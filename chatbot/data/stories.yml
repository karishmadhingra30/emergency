version: "3.1"

stories:
  - story: greet and ask for shelter
    steps:
      - intent: greet
      - action: utter_greet
      - intent: ask_nearest_shelter
      - action: action_find_nearest_shelter

  - story: directly ask for nearest shelter
    steps:
      - intent: ask_nearest_shelter
      - action: action_find_nearest_shelter

  - story: ask for shelter locations
    steps:
      - intent: ask_shelter_location
      - action: action_find_nearest_shelter

  - story: ask for first aid help
    steps:
      - intent: greet
      - action: utter_greet
      - intent: ask_first_aid
      - action: action_provide_first_aid

  - story: directly ask for first aid
    steps:
      - intent: ask_first_aid
      - action: action_provide_first_aid

  - story: thank and goodbye
    steps:
      - intent: thanks
      - action: utter_you_are_welcome
      - intent: goodbye
      - action: utter_goodbye

  - story: simple goodbye
    steps:
      - intent: goodbye
      - action: utter_goodbye
