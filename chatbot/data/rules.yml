version: "3.1"

rules:
  - rule: Say goodbye anytime the user says goodbye
    steps:
      - intent: goodbye
      - action: utter_goodbye

  - rule: Say 'you're welcome' anytime user says thanks
    steps:
      - intent: thanks
      - action: utter_you_are_welcome

  - rule: Greet user
    steps:
      - intent: greet
      - action: utter_greet
