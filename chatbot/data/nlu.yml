version: "3.1"

nlu:
  - intent: greet
    examples: |
      - hey
      - hello
      - hi
      - hello there
      - good morning
      - good evening
      - hey there
      - help
      - help me
      - i need help
      - emergency

  - intent: goodbye
    examples: |
      - bye
      - goodbye
      - see you later
      - talk to you later
      - take care
      - bye bye
      - got to go
      - thanks bye

  - intent: affirm
    examples: |
      - yes
      - yeah
      - yep
      - sure
      - of course
      - that sounds good
      - correct
      - ok
      - okay

  - intent: deny
    examples: |
      - no
      - nope
      - never
