<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Medical ID - Emergency Aid</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', sans-serif;
            background: linear-gradient(135deg, #DC2626 0%, #B91C1C 100%);
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            padding: 20px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
            color: white;
        }

        .back-button {
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .back-button:active {
            background-color: rgba(255, 255, 255, 0.3);
        }

        .page-title {
            font-size: 28px;
            font-weight: 800;
            flex: 1;
        }

        /* Medical ID Card */
        .medical-card {
            background: linear-gradient(to bottom, #FAF9F7 0%, #F5F4F1 100%);
            border-radius: 24px;
            padding: 32px 28px;
            margin-bottom: 24px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 24px;
        }

        .card-title-section {
            flex: 1;
        }

        .card-title {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .asterisk-icon {
            color: #EF4444;
            font-size: 32px;
            font-weight: 900;
        }

        .title-text {
            color: #EF4444;
            font-size: 28px;
            font-weight: 800;
        }

        .profile-photo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #E5E7EB 0%, #D1D5DB 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: #6B7280;
            overflow: hidden;
            flex-shrink: 0;
        }

        .profile-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .name-input {
            font-size: 28px;
            font-weight: 700;
            color: #1F2937;
            border: none;
            background: transparent;
            width: 100%;
            margin-bottom: 4px;
            padding: 4px 0;
        }

        .name-input:focus {
            outline: none;
            border-bottom: 2px solid #EF4444;
        }

        .basic-info {
            font-size: 18px;
            color: #4B5563;
            margin-bottom: 2px;
        }

        .basic-info input {
            border: none;
            background: transparent;
            font-size: 18px;
            color: #4B5563;
            width: auto;
            min-width: 100px;
            padding: 2px 4px;
        }

        .basic-info input:focus {
            outline: none;
            border-bottom: 1px solid #EF4444;
        }

        .organ-donor {
            color: #6B7280;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 8px;
        }

        .divider {
            height: 1px;
            background: linear-gradient(to right, transparent, #D1D5DB, transparent);
            margin: 20px 0;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .info-section {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .info-label {
            color: #EF4444;
            font-size: 14px;
            font-weight: 700;
            text-transform: capitalize;
        }

        .info-value {
            color: #1F2937;
            font-size: 16px;
            font-weight: 500;
        }

        .info-value input,
        .info-value textarea {
            border: none;
            background: rgba(255, 255, 255, 0.5);
            font-size: 16px;
            color: #1F2937;
            width: 100%;
            padding: 8px 12px;
            border-radius: 8px;
            font-family: inherit;
        }

        .info-value textarea {
            min-height: 60px;
            resize: vertical;
        }

        .info-value input:focus,
        .info-value textarea:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.8);
            box-shadow: 0 0 0 2px #EF4444;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        .additional-info {
            background: rgba(255, 255, 255, 0.3);
            padding: 16px;
            border-radius: 12px;
        }

        .additional-info .info-label {
            margin-bottom: 12px;
        }

        .additional-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        .additional-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .additional-item-label {
            color: #4B5563;
            font-size: 14px;
            font-weight: 600;
        }

        .additional-item-value {
            display: flex;
            align-items: baseline;
            gap: 4px;
        }

        .additional-item-value input {
            border: none;
            background: rgba(255, 255, 255, 0.6);
            font-size: 16px;
            color: #1F2937;
            font-weight: 600;
            padding: 6px 10px;
            border-radius: 6px;
            width: 100%;
        }

        .additional-item-value input:focus {
            outline: none;
            background: white;
            box-shadow: 0 0 0 2px #EF4444;
        }

        .unit {
            color: #6B7280;
            font-size: 14px;
        }

        /* Motivation Banner */
        .motivation-banner {
            background: linear-gradient(135deg, #9F1239 0%, #881337 100%);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            color: white;
            margin-top: 20px;
        }

        .heart-icon {
            font-size: 36px;
            margin-bottom: 12px;
        }

        .motivation-text {
            font-size: 18px;
            font-weight: 700;
            line-height: 1.4;
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .btn {
            flex: 1;
            padding: 16px 24px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: white;
            color: #DC2626;
        }

        .btn-primary:active {
            transform: scale(0.98);
            background: #F3F4F6;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid white;
        }

        .btn-secondary:active {
            background: rgba(255, 255, 255, 0.3);
        }

        /* Responsive Design */
        @media (max-width: 640px) {
            .info-grid {
                grid-template-columns: 1fr;
            }

            .additional-grid {
                grid-template-columns: 1fr;
            }

            .card-header {
                flex-direction: column-reverse;
                align-items: center;
                text-align: center;
            }

            .profile-photo {
                margin-bottom: 16px;
            }

            .action-buttons {
                flex-direction: column;
            }
        }

        /* Reduce Motion */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="/" class="back-button">
            <span>←</span>
            <span>Back</span>
        </a>
        <h1 class="page-title">Medical ID</h1>
    </div>

    <div class="medical-card">
        <div class="card-header">
            <div class="card-title-section">
                <div class="card-title">
                    <span class="asterisk-icon">✱</span>
                    <span class="title-text">Medical ID</span>
                </div>
                <input type="text" class="name-input" id="fullName" placeholder="Your Full Name" value="">
                <div class="basic-info">
                    <input type="number" id="age" placeholder="Age" value="" style="width: 60px;"> Years old
                </div>
                <div class="basic-info">
                    <input type="text" id="nationality" placeholder="Nationality" value="Indian">
                </div>
                <div class="organ-donor" id="organDonorStatus">NOT AN ORGAN DONOR</div>
            </div>
            <div class="profile-photo" id="profilePhoto">
                👤
            </div>
        </div>

        <div class="divider"></div>

        <div class="info-grid">
            <div class="info-section">
                <div class="info-label">Gender</div>
                <div class="info-value">
                    <select id="gender" style="border: none; background: rgba(255, 255, 255, 0.5); font-size: 16px; color: #1F2937; width: 100%; padding: 8px 12px; border-radius: 8px;">
                        <option value="">Select</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
            </div>

            <div class="info-section">
                <div class="info-label">Notes</div>
                <div class="info-value">
                    <input type="text" id="notes" placeholder="Any important notes">
                </div>
            </div>

            <div class="info-section">
                <div class="info-label">Allergies</div>
                <div class="info-value">
                    <textarea id="allergies" placeholder="List any allergies"></textarea>
                </div>
            </div>

            <div class="info-section">
                <div class="info-label">Medicines</div>
                <div class="info-value">
                    <textarea id="medicines" placeholder="Current medications"></textarea>
                </div>
            </div>

            <div class="info-section full-width">
                <div class="info-label">Health Status</div>
                <div class="info-value">
                    <textarea id="healthStatus" placeholder="Any medical conditions or health status"></textarea>
                </div>
            </div>
        </div>

        <div class="additional-info">
            <div class="info-label">Additional Information</div>
            <div class="additional-grid">
                <div class="additional-item">
                    <div class="additional-item-label">Height</div>
                    <div class="additional-item-value">
                        <input type="text" id="height" placeholder="174">
                        <span class="unit">cm</span>
                    </div>
                </div>
                <div class="additional-item">
                    <div class="additional-item-label">Weight</div>
                    <div class="additional-item-value">
                        <input type="text" id="weight" placeholder="70">
                        <span class="unit">kg</span>
                    </div>
                </div>
                <div class="additional-item">
                    <div class="additional-item-label">Blood type</div>
                    <div class="additional-item-value">
                        <select id="bloodType" style="border: none; background: rgba(255, 255, 255, 0.6); font-size: 16px; color: #1F2937; font-weight: 600; padding: 6px 10px; border-radius: 6px; width: 100%;">
                            <option value="">Select</option>
                            <option value="A+">A+</option>
                            <option value="A-">A-</option>
                            <option value="B+">B+</option>
                            <option value="B-">B-</option>
                            <option value="AB+">AB+</option>
                            <option value="AB-">AB-</option>
                            <option value="O+">O+</option>
                            <option value="O-">O-</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <div class="motivation-banner">
            <div class="heart-icon">❤️</div>
            <div class="motivation-text">
                Don't leave your life to<br>someone else's intuition.
            </div>
        </div>
    </div>

    <div class="action-buttons">
        <button class="btn btn-primary" onclick="saveMedicalInfo()">💾 Save Information</button>
        <button class="btn btn-secondary" onclick="clearForm()">🔄 Clear Form</button>
    </div>

    <script>
        // Load saved data on page load
        window.addEventListener('DOMContentLoaded', () => {
            loadMedicalInfo();
        });

        function saveMedicalInfo() {
            const medicalData = {
                fullName: document.getElementById('fullName').value,
                age: document.getElementById('age').value,
                nationality: document.getElementById('nationality').value,
                gender: document.getElementById('gender').value,
                notes: document.getElementById('notes').value,
                allergies: document.getElementById('allergies').value,
                medicines: document.getElementById('medicines').value,
                healthStatus: document.getElementById('healthStatus').value,
                height: document.getElementById('height').value,
                weight: document.getElementById('weight').value,
                bloodType: document.getElementById('bloodType').value,
                lastUpdated: new Date().toISOString()
            };

            // Save to localStorage
            localStorage.setItem('medicalInfo', JSON.stringify(medicalData));

            // Visual feedback
            alert('✅ Medical information saved successfully!');

            // Haptic feedback
            if ('vibrate' in navigator) {
                navigator.vibrate(50);
            }
        }

        function loadMedicalInfo() {
            const savedData = localStorage.getItem('medicalInfo');
            if (savedData) {
                const medicalData = JSON.parse(savedData);
                document.getElementById('fullName').value = medicalData.fullName || '';
                document.getElementById('age').value = medicalData.age || '';
                document.getElementById('nationality').value = medicalData.nationality || 'Indian';
                document.getElementById('gender').value = medicalData.gender || '';
                document.getElementById('notes').value = medicalData.notes || '';
                document.getElementById('allergies').value = medicalData.allergies || '';
                document.getElementById('medicines').value = medicalData.medicines || '';
                document.getElementById('healthStatus').value = medicalData.healthStatus || '';
                document.getElementById('height').value = medicalData.height || '';
                document.getElementById('weight').value = medicalData.weight || '';
                document.getElementById('bloodType').value = medicalData.bloodType || '';
            }
        }

        function clearForm() {
            if (confirm('Are you sure you want to clear all medical information?')) {
                document.getElementById('fullName').value = '';
                document.getElementById('age').value = '';
                document.getElementById('nationality').value = 'Indian';
                document.getElementById('gender').value = '';
                document.getElementById('notes').value = '';
                document.getElementById('allergies').value = '';
                document.getElementById('medicines').value = '';
                document.getElementById('healthStatus').value = '';
                document.getElementById('height').value = '';
                document.getElementById('weight').value = '';
                document.getElementById('bloodType').value = '';

                localStorage.removeItem('medicalInfo');
                alert('✅ Form cleared successfully!');
            }
        }

        // Haptic feedback for buttons
        document.querySelectorAll('.btn, .back-button').forEach(button => {
            button.addEventListener('touchstart', () => {
                if ('vibrate' in navigator) {
                    navigator.vibrate(10);
                }
            });
        });
    </script>
</body>
</html>
