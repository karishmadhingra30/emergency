<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Emergency Aid</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', sans-serif;
            background-color: #EF233C;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            max-width: 100%;
        }

        /* Header Section */
        .header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 60px;
        }

        .emergency-icon {
            width: 160px;
            height: 160px;
            background-color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 40px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        }

        .emergency-icon-inner {
            width: 100px;
            height: 100px;
            border: 8px solid #EF233C;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .exclamation {
            font-size: 70px;
            color: #EF233C;
            font-weight: bold;
            line-height: 1;
        }

        .title {
            font-size: 36px;
            font-weight: 600;
            margin-bottom: 20px;
            text-align: center;
        }

        .subtitle {
            font-size: 20px;
            text-align: center;
            opacity: 0.95;
            max-width: 450px;
            line-height: 1.5;
        }

        /* Buttons Section */
        .buttons-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 600px;
            margin-bottom: 60px;
        }

        .btn {
            background-color: white;
            color: #EF233C;
            border: none;
            border-radius: 16px;
            padding: 22px 40px;
            font-size: 24px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            text-decoration: none;
            transition: all 0.2s ease;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-outline {
            background-color: transparent;
            color: white;
            border: 3px solid white;
        }

        .btn-outline:active {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .icon {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* SVG Icons */
        .chat-icon {
            stroke: currentColor;
            stroke-width: 2.5;
            fill: none;
        }

        .location-icon {
            fill: currentColor;
        }

        .menu-icon {
            fill: none;
            stroke: currentColor;
            stroke-width: 3;
            stroke-linecap: round;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 20px;
            font-size: 20px;
            font-weight: 500;
            margin-top: auto;
            opacity: 0.9;
        }

        /* Menu Overlay */
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }

        .menu-overlay.active {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .menu-content {
            background-color: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .menu-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }

        .menu-title {
            font-size: 28px;
            font-weight: 700;
            color: #EF233C;
        }

        .close-menu {
            background: none;
            border: none;
            font-size: 32px;
            color: #666;
            cursor: pointer;
            padding: 0;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background-color 0.2s;
        }

        .close-menu:active {
            background-color: #f0f0f0;
        }

        .menu-items {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .menu-item {
            background-color: #f8f9fa;
            border: none;
            border-radius: 12px;
            padding: 18px 20px;
            font-size: 18px;
            font-weight: 600;
            color: #333;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .menu-item:active {
            background-color: #e9ecef;
            transform: scale(0.98);
        }

        .menu-item-icon {
            font-size: 24px;
            width: 30px;
            text-align: center;
        }

        /* Responsive Design */
        @media (min-width: 768px) {
            .container {
                max-width: 600px;
                margin: 0 auto;
            }
        }

        @media (max-height: 700px) {
            .header {
                margin-bottom: 40px;
            }

            .emergency-icon {
                width: 130px;
                height: 130px;
                margin-bottom: 30px;
            }

            .emergency-icon-inner {
                width: 80px;
                height: 80px;
                border-width: 6px;
            }

            .exclamation {
                font-size: 56px;
            }

            .title {
                font-size: 30px;
                margin-bottom: 15px;
            }

            .subtitle {
                font-size: 18px;
            }

            .buttons-section {
                margin-bottom: 40px;
            }

            .btn {
                padding: 18px 32px;
                font-size: 22px;
            }
        }

        /* Accessibility */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="emergency-icon">
                <div class="emergency-icon-inner">
                    <span class="exclamation">!</span>
                </div>
            </div>
            <h1 class="title">Emergency Aid</h1>
            <p class="subtitle">Quick access to help when you need it most</p>
        </div>

        <div class="buttons-section">
            <a href="/map?view=chat" class="btn">
                <svg class="icon chat-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                First Aid Chat
            </a>

            <a href="/map?view=shelters" class="btn">
                <svg class="icon location-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
                </svg>
                Find Shelters
            </a>

            <button class="btn btn-outline" onclick="showMenu()">
                <svg class="icon menu-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
                Menu & Settings
            </button>
        </div>

        <div class="footer">
            Offline Emergency Aid
        </div>
    </div>

    <!-- Menu Overlay -->
    <div class="menu-overlay" id="menuOverlay" onclick="closeMenuOnOverlay(event)">
        <div class="menu-content">
            <div class="menu-header">
                <h2 class="menu-title">Menu & Settings</h2>
                <button class="close-menu" onclick="closeMenu()">×</button>
            </div>
            <div class="menu-items">
                <a href="/map?view=info" class="menu-item">
                    <span class="menu-item-icon">ℹ️</span>
                    <span>Emergency Information</span>
                </a>
                <a href="/emergency-contacts" class="menu-item">
                    <span class="menu-item-icon">📋</span>
                    <span>Emergency Contacts</span>
                </a>
                <a href="/medical-info" class="menu-item">
                    <span class="menu-item-icon">💊</span>
                    <span>Medical Information</span>
                </a>
                <button class="menu-item" onclick="shareLocation()">
                    <span class="menu-item-icon">📍</span>
                    <span>Share Location</span>
                </button>
                <button class="menu-item" onclick="showSettings()">
                    <span class="menu-item-icon">⚙️</span>
                    <span>Settings</span>
                </button>
                <button class="menu-item" onclick="showAbout()">
                    <span class="menu-item-icon">ℹ️</span>
                    <span>About</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        // Menu Functions
        function showMenu() {
            document.getElementById('menuOverlay').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeMenu() {
            document.getElementById('menuOverlay').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        function closeMenuOnOverlay(event) {
            if (event.target.id === 'menuOverlay') {
                closeMenu();
            }
        }

        // Menu Item Functions
        function shareLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    position => {
                        const lat = position.coords.latitude.toFixed(6);
                        const lon = position.coords.longitude.toFixed(6);
                        const locationText = `My location: ${lat}, ${lon}\nhttps://maps.google.com/?q=${lat},${lon}`;

                        if (navigator.share) {
                            navigator.share({
                                title: 'My Emergency Location',
                                text: locationText
                            });
                        } else {
                            alert('Your Location:\n\n' + locationText + '\n\nCopy this to share with emergency contacts.');
                        }
                    },
                    error => {
                        alert('Could not access your location. Please enable location services.');
                    }
                );
            } else {
                alert('Geolocation is not supported by your device.');
            }
        }

        function showSettings() {
            alert('Settings\n\n' +
                'Configure app preferences:\n' +
                '• Language\n' +
                '• Notifications\n' +
                '• Data storage\n' +
                '• Emergency contacts\n\n' +
                'Feature coming soon!');
        }

        function showAbout() {
            alert('Emergency Aid\n\n' +
                'Version: 1.0\n' +
                'Offline-first emergency assistance app\n\n' +
                'Features:\n' +
                '• First Aid Chat - AI-powered medical guidance\n' +
                '• Shelter Locator - Find nearby safe places\n' +
                '• Works completely offline\n\n' +
                'For emergencies, always contact professional help.');
        }

        // Vibrate on button press for haptic feedback
        document.querySelectorAll('.btn, .menu-item').forEach(button => {
            button.addEventListener('touchstart', () => {
                if ('vibrate' in navigator) {
                    navigator.vibrate(10);
                }
            });
        });

        // Prevent accidental zoom on double-tap
        let lastTouchEnd = 0;
        document.addEventListener('touchend', (event) => {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) {
                event.preventDefault();
            }
            lastTouchEnd = now;
        }, false);

        // Close menu on escape key
        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape') {
                closeMenu();
            }
        });
    </script>
</body>
</html>
