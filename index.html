<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Emergency Aid</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', sans-serif;
            background: linear-gradient(135deg, #DC2626 0%, #B91C1C 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            max-width: 100%;
        }

        /* Status Bar */
        .status-bar {
            background-color: rgba(0, 0, 0, 0.2);
            padding: 12px 20px;
            font-size: 14px;
            font-weight: 500;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            background-color: #10B981;
            border-radius: 50%;
            animation: pulse-status 2s ease-in-out infinite;
        }

        @keyframes pulse-status {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* SOS Emergency Button - Most Prominent */
        .sos-section {
            margin-bottom: 30px;
        }

        .sos-button {
            background: linear-gradient(135deg, #FCD34D 0%, #F59E0B 100%);
            color: #7C2D12;
            border: 4px solid #ffffff;
            border-radius: 20px;
            padding: 32px 40px;
            font-size: 32px;
            font-weight: 800;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-decoration: none;
            transition: all 0.2s ease;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            min-height: 140px;
            position: relative;
            overflow: hidden;
        }

        .sos-button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0);
            animation: sos-pulse 2s ease-out infinite;
        }

        @keyframes sos-pulse {
            0% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -50%) scale(2.5);
                opacity: 0;
            }
        }

        .sos-button:active {
            transform: scale(0.98);
        }

        .sos-icon {
            font-size: 48px;
            position: relative;
            z-index: 1;
        }

        .sos-text {
            position: relative;
            z-index: 1;
            letter-spacing: 4px;
        }

        .sos-subtitle {
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.5px;
            position: relative;
            z-index: 1;
        }

        /* Primary Action Buttons */
        .primary-actions {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 24px;
        }

        .action-btn {
            background-color: white;
            color: #DC2626;
            border: none;
            border-radius: 16px;
            padding: 24px 32px;
            font-size: 22px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 20px;
            text-decoration: none;
            transition: all 0.2s ease;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
            min-height: 80px;
        }

        .action-btn:active {
            transform: scale(0.98);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .action-icon {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #FEE2E2;
            border-radius: 12px;
            flex-shrink: 0;
        }

        .action-icon svg {
            width: 24px;
            height: 24px;
        }

        .action-content {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            text-align: left;
        }

        .action-title {
            font-size: 20px;
            font-weight: 700;
            line-height: 1.2;
        }

        .action-subtitle {
            font-size: 14px;
            font-weight: 500;
            color: #DC2626;
            opacity: 0.7;
            margin-top: 4px;
        }

        /* Secondary Actions */
        .secondary-actions {
            margin-top: auto;
            padding-top: 20px;
        }

        .secondary-btn {
            background-color: transparent;
            color: white;
            border: 3px solid white;
            border-radius: 14px;
            padding: 18px 24px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-decoration: none;
            transition: all 0.2s ease;
            min-height: 64px;
        }

        .secondary-btn:active {
            background-color: rgba(255, 255, 255, 0.15);
        }

        /* Emergency Contact Footer */
        .emergency-footer {
            margin-top: 24px;
            padding: 20px;
            background-color: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            text-align: center;
        }

        .emergency-number {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 2px;
            margin-top: 8px;
        }

        .emergency-label {
            font-size: 14px;
            opacity: 0.9;
            font-weight: 600;
        }

        /* SVG Icons */
        .chat-icon {
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
        }

        .location-icon {
            fill: currentColor;
        }

        .menu-icon {
            fill: none;
            stroke: currentColor;
            stroke-width: 2.5;
            stroke-linecap: round;
        }

        .phone-icon {
            fill: none;
            stroke: currentColor;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Responsive Design */
        @media (min-width: 768px) {
            .container {
                max-width: 480px;
                margin: 0 auto;
            }
        }

        @media (max-height: 700px) {
            .sos-button {
                padding: 24px 32px;
                min-height: 110px;
            }

            .sos-icon {
                font-size: 36px;
            }

            .sos-text {
                font-size: 28px;
            }

            .action-btn {
                min-height: 70px;
                padding: 20px 28px;
            }
        }

        /* Accessibility - High Contrast Mode */
        @media (prefers-contrast: high) {
            .action-btn {
                border: 2px solid #DC2626;
            }

            .sos-button {
                border-width: 6px;
            }
        }

        /* Reduce Motion for Users Who Prefer It */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Status Indicator -->
        <div class="status-bar">
            <span class="status-indicator"></span>
            <span>Offline Mode - Ready to Help</span>
        </div>

        <!-- Emergency Information - Most Prominent Action -->
        <div class="sos-section">
            <a href="/map?view=info" class="sos-button">
                <div class="sos-icon">ℹ️</div>
                <div class="sos-text">HELP</div>
                <div class="sos-subtitle">EMERGENCY INFORMATION</div>
            </a>
        </div>

        <!-- Primary Actions -->
        <div class="primary-actions">
            <a href="/map?view=chat" class="action-btn">
                <div class="action-icon">
                    <svg class="chat-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <div class="action-content">
                    <div class="action-title">First Aid Chat</div>
                    <div class="action-subtitle">Get immediate guidance</div>
                </div>
            </a>

            <a href="/map?view=shelters" class="action-btn">
                <div class="action-icon">
                    <svg class="location-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
                    </svg>
                </div>
                <div class="action-content">
                    <div class="action-title">Find Shelters</div>
                    <div class="action-subtitle">Locate nearest safe places</div>
                </div>
            </a>
        </div>

        <!-- Secondary Actions -->
        <div class="secondary-actions">
            <button class="secondary-btn" onclick="showMenu()">
                <svg class="menu-icon" width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
                More Options
            </button>
        </div>

        <!-- App Info -->
        <div class="emergency-footer">
            <div class="emergency-label">Offline Emergency Aid</div>
            <div class="emergency-number" style="font-size: 16px; letter-spacing: 0;">No Internet Required</div>
        </div>
    </div>

    <script>
        function showMenu() {
            // Future: Show menu with settings, emergency contacts, medical info, etc.
            const options = [
                '📋 Emergency Contacts',
                '💊 Medical Information',
                '⚙️ Settings',
                '📍 Share Location',
                'ℹ️ About'
            ].join('\n');
            alert('Menu Options:\n\n' + options + '\n\n(Coming soon)');
        }

        // Vibrate on button press for haptic feedback
        document.querySelectorAll('.action-btn, .sos-button, .secondary-btn').forEach(button => {
            button.addEventListener('touchstart', () => {
                if ('vibrate' in navigator) {
                    navigator.vibrate(10);
                }
            });
        });

        // Prevent accidental zoom on double-tap
        let lastTouchEnd = 0;
        document.addEventListener('touchend', (event) => {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) {
                event.preventDefault();
            }
            lastTouchEnd = now;
        }, false);
    </script>
</body>
</html>
